<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords"
        content="streetwear sneakers, trendy shoes, sneaker shop, affordable kicks, men's sneakers, women's footwear, casual shoes, ShoeHub online store, shoes">
    <meta name="description"
        content="Shop stylish and affordable shoes at ShoeHub, your go-to online store for trendy sneakers, casual footwear, and everyday comfort">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/media.css">
    <title>Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1 class="logo">Shoe<span>Hub</span></h1>
        <div class="header__icon">
            <button class="header__btn btn"><img src="/assets/icon/cart-shopping-solid-full.svg" alt="cart">
                Cart</button>
        </div>
    </header>

    <main>
        <nav>
            <div class="search__container">
                <img src="/assets/icon/sistrix-brands-solid-full.svg" alt="search">
                <input type="search" placeholder="Search for shoe...">
            </div>
            <img src="/assets/icon/comment-dots-regular-full.svg" alt="chat">
        </nav>
        <div class="container">
            <div class="list">
                <div class="footwear">
                    <h2 class="list__title">Footwear</h2>
                    <div class="footwear__item gen">
                        <input type="checkbox" name="shoe" id="sneaker">
                        <label for="sneaker">Sneakers</label>
                    </div>

                    <div class="footwear__item gen">
                        <input type="checkbox" name="shoe" id="boots">
                        <label for="boots">Boots</label>
                    </div>

                    <div class="footwear__item gen">
                        <input type="checkbox" name="shoe" id="sandal">
                        <label for="sandal">Sandal</label>
                    </div>

                    <div class="footwear__item gen">
                        <input type="checkbox" name="shoe" id="heels">
                        <label for="heels">Heels</label>
                    </div>

                    <div class="footwear__item gen">
                        <input type="checkbox" name="shoe" id="loafers">
                        <label for="loafers">Loafers</label>
                    </div>
                </div>

                <div class="brand">
                    <h2 class="list__title">Brands</h2>

                    <div class="brand__item gen">
                        <input type="checkbox" name="brand" id="nike">
                        <label for="nike">Nike</label>
                    </div>

                    <div class="brand__item gen">
                        <input type="checkbox" name="brand" id="adidas">
                        <label for="adidas">Adidas</label>
                    </div>

                    <div class="brand__item gen">
                        <input type="checkbox" name="brand" id="puma">
                        <label for="puma">Puma</label>
                    </div>

                    <div class="brand__item gen">
                        <input type="checkbox" name="brand" id="converse">
                        <label for="converse">Converse</label>
                    </div>

                    <div class="brand__item gen">
                        <input type="checkbox" name="brand" id="timberland">
                        <label for="timberland">Timberland</label>
                    </div>
                </div>
            </div>
            <div class="item__container">
                <div class="card">
                    <img src="/assets/image/shop_item-1-mobile.webp" alt="Nike Air Max">
                    <div class="content">
                        <h3 class="name">Nike Air Max</h3>
                        <p class="price">$120.00</p>
                    </div>
                </div>

                <div class="card">
                    <img src="/assets/image/shop_item-2-mobile.webp" alt="Red high heel">
                    <div class="content">
                        <h3 class="name">Red High Heel</h3>
                        <p class="price">$60.00</p>
                    </div>
                </div>

                <div class="card">
                    <img src="/assets/image/shop_item-3-mobile.webp" alt="Brown Leather Boots">
                    <div class="content">
                        <h3 class="name">Brown Leather boots</h3>
                        <p class="price">$110.00</p>
                    </div>
                </div>

                <div class="card">
                    <img src="/assets/image/shop_item-4-mobile.webp" alt="Running Shoe">
                    <div class="content">
                        <h3 class="name">Running Shoes</h3>
                        <p class="price">$95.00</p>
                    </div>
                </div>

                <div class="card">
                    <img src="/assets/image/shop_item-5-mobile.webp" alt="Adidas Runnig Shoes">
                    <div class="content">
                        <h3 class="name">Adidas Runnig Shoes</h3>
                        <p class="price">$95.00</p>
                    </div>
                </div>

                <div class="card">
                    <img src="/assets/image/shop_item-6-mobile.webp" alt="Black Ankle Boots">
                    <div class="content">
                        <h3 class="name">Black Ankle Boots</h3>
                        <p class="price">$90.00</p>
                    </div>
                </div>

                <div class="card">
                    <img src="/assets/image/shop_item-7-mobile.webp" alt="Suede Loafers">
                    <div class="content">
                        <h3 class="name">Suede Loafers</h3>
                        <p class="price">$70.00</p>
                    </div>
                </div>

                <div class="card">
                    <img src="/assets/image/shop_item-8-mobile.webp" alt="Adidas Running Shoe">
                    <div class="content">
                        <h3 class="name">Adidas Running Shoe</h3>
                        <p class="price">$95.00</p>
                    </div>
                </div>

                <div class="card">
                    <img src="/assets/image/shop_item-9-mobile.webp" alt="Black Ankle Boots">
                    <div class="content">
                        <h3 class="name">Black Ankle Boots</h3>
                        <p class="price">$90.00</p>
                    </div>
                </div>

                <div class="card">
                    <img src="/assets/image/shop_item-10-mobile.webp" alt="Suede Loafers">
                    <div class="content">
                        <h3 class="name">Suede Loafers</h3>
                        <p class="price">$70.00</p>
                    </div>
                </div>
            </div>
        </div>

    </main>
</body>

</html>
